<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document to Markdown</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #5f6b7a;
        --line: #d8dee7;
        --accent: #176b87;
        --accent-strong: #0f5267;
        --accent-soft: #e6f3f7;
        --focus: #c46a24;
        --danger: #a33a2a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(31, 41, 51, 0.045) 1px, transparent 1px),
          linear-gradient(0deg, rgba(31, 41, 51, 0.045) 1px, transparent 1px),
          var(--bg);
        background-size: 32px 32px;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.12;
        font-weight: 760;
        letter-spacing: 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .converter {
        display: grid;
        gap: 20px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(31, 41, 51, 0.08);
      }

      .upload {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 220px;
        padding: 26px;
        border: 2px dashed #aab7c4;
        border-radius: 8px;
        background: #fbfcfd;
        transition:
          border-color 160ms ease,
          background 160ms ease;
      }

      .upload:focus-within,
      .upload:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .upload input {
        position: absolute;
        inset: 0;
        cursor: pointer;
        opacity: 0;
      }

      .upload-inner {
        display: grid;
        justify-items: center;
        gap: 10px;
        text-align: center;
        pointer-events: none;
      }

      .doc-icon {
        width: 54px;
        height: 68px;
        border: 2px solid var(--accent);
        border-radius: 6px;
        background:
          linear-gradient(135deg, transparent 0 73%, #b9e0ea 73% 100%),
          #ffffff;
      }

      .upload-title {
        font-size: 18px;
        font-weight: 720;
      }

      .upload-name {
        min-height: 20px;
        color: var(--muted);
        font-size: 14px;
        overflow-wrap: anywhere;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      select,
      input[type="text"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
        font-size: 15px;
        padding: 0 11px;
      }

      select:focus,
      input[type="text"]:focus,
      button:focus-visible {
        outline: 3px solid rgba(196, 106, 36, 0.28);
        outline-offset: 2px;
        border-color: var(--focus);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-top: 1px solid var(--line);
        padding-top: 20px;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .progress {
        display: grid;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding-top: 20px;
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .progress-title {
        color: var(--text);
        font-weight: 720;
      }

      .progress-detail {
        overflow-wrap: anywhere;
        text-align: right;
      }

      .progress-track {
        position: relative;
        height: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--accent-soft);
      }

      .progress-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        left: -42%;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #6aa8b8);
        animation: progress-slide 1100ms ease-in-out infinite;
      }

      .progress.determinate .progress-fill {
        left: 0;
        width: 0;
        animation: none;
        transition: width 320ms ease;
      }

      .progress.done .progress-fill {
        left: 0;
        width: 100%;
        animation: none;
        background: #2f855a;
      }

      .progress.failed .progress-fill {
        left: 0;
        width: 100%;
        animation: none;
        background: var(--danger);
      }

      @keyframes progress-slide {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(340%);
        }
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 148px;
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 720;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .secondary-button {
        min-width: 0;
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--accent);
      }

      .secondary-button:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .retry-button {
        color: var(--danger);
      }

      .result-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button:disabled {
        cursor: wait;
        background: #8ba4ad;
      }

      .secondary-button:disabled {
        border-color: var(--line);
        background: #eef2f5;
        color: var(--muted);
      }

      input:disabled,
      select:disabled {
        cursor: not-allowed;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 920px);
          padding: 20px 0;
        }

        header,
        .actions {
          align-items: stretch;
          flex-direction: column;
        }

        .progress-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .progress-detail {
          text-align: left;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .converter {
          padding: 16px;
        }

        h1 {
          font-size: 24px;
        }

        button {
          width: 100%;
        }

        .result-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Document to Markdown</h1>
        <div class="status" id="status">Ready</div>
      </header>

      <form class="converter" action="/convert" method="post" enctype="multipart/form-data">
        <label class="upload" for="file">
          <input id="file" name="file" type="file" required />
          <span class="upload-inner">
            <span class="doc-icon" aria-hidden="true"></span>
            <span class="upload-title">Upload a document</span>
            <span class="upload-name" id="file-name">PDF, Word, Excel, PowerPoint, Markdown, or image</span>
          </span>
        </label>

        <div class="grid">
          <label>
            Converter
            <select id="engine" name="engine">
              <option value="standard">Standard</option>
              <option value="paddle">Tesseract OCR</option>
            </select>
          </label>

          <input id="paddle-mode" name="paddle_mode" type="hidden" value="ocr" />

          <label class="paddle-field hidden">
            Language
            <select name="lang">
              <option value="ru">Russian</option>
              <option value="kk">Kazakh</option>
              <option value="en">English</option>
            </select>
          </label>

          <label class="paddle-field hidden">
            Device
            <select name="device">
              <option value="cpu">CPU (recommended)</option>
              <option value="gpu">GPU (server only)</option>
            </select>
          </label>
        </div>

        <div class="actions">
          <div class="note" id="note">Standard is best for PDFs and Office documents with selectable text.</div>
          <button type="submit" id="submit">Convert</button>
        </div>

        <div class="progress hidden" id="progress" aria-live="polite">
          <div class="progress-head">
            <span class="progress-title" id="progress-title">Processing</span>
            <span class="progress-detail" id="progress-detail">Starting conversion...</span>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Conversion progress">
            <span class="progress-fill"></span>
          </div>
          <div class="result-actions hidden" id="result-actions">
            <button class="secondary-button" id="download-button" type="button">Download file</button>
            <button class="secondary-button" id="new-file-button" type="button">Upload another file</button>
            <button class="secondary-button retry-button hidden" id="retry-button" type="button">Retry</button>
          </div>
        </div>
      </form>
    </main>

    <script>
      const form = document.querySelector("form");
      const fileInput = document.getElementById("file");
      const fileName = document.getElementById("file-name");
      const engine = document.getElementById("engine");
      const paddleMode = document.getElementById("paddle-mode");
      const status = document.getElementById("status");
      const note = document.getElementById("note");
      const submit = document.getElementById("submit");
      const progress = document.getElementById("progress");
      const progressTitle = document.getElementById("progress-title");
      const progressDetail = document.getElementById("progress-detail");
      const progressTrack = document.querySelector(".progress-track");
      const progressFill = document.querySelector(".progress-fill");
      const resultActions = document.getElementById("result-actions");
      const downloadButton = document.getElementById("download-button");
      const newFileButton = document.getElementById("new-file-button");
      const retryButton = document.getElementById("retry-button");
      const paddleFields = Array.from(document.querySelectorAll(".paddle-field"));
      const controlFields = Array.from(form.querySelectorAll("input, select"));
      let pollTimer = null;
      let latestDownloadUrl = "";

      function updateEngine() {
        const usePaddle = engine.value === "paddle";
        paddleFields.forEach((field) => field.classList.toggle("hidden", !usePaddle));
        if (!usePaddle) {
          note.textContent = "Standard is best for PDFs and Office documents with selectable text.";
          return;
        }
        note.textContent = "Tesseract OCR works best for scanned PDFs and images.";
      }

      function setBusy(isBusy) {
        submit.disabled = isBusy;
        submit.textContent = isBusy ? "Processing..." : "Convert";
      }

      function setControlsDisabled(isDisabled) {
        controlFields.forEach((field) => {
          field.disabled = isDisabled;
        });
      }

      function setProgress(title, detail, state = "", percent = null) {
        progress.classList.remove("hidden", "done", "failed", "determinate");
        progressFill.style.width = "";
        progressTrack.removeAttribute("aria-valuenow");
        progressTrack.removeAttribute("aria-valuemin");
        progressTrack.removeAttribute("aria-valuemax");
        if (state) {
          progress.classList.add(state);
        }
        if (Number.isFinite(percent)) {
          const clampedPercent = Math.max(0, Math.min(100, Math.round(percent)));
          progress.classList.add("determinate");
          progressFill.style.width = `${clampedPercent}%`;
          progressTrack.setAttribute("aria-valuemin", "0");
          progressTrack.setAttribute("aria-valuemax", "100");
          progressTrack.setAttribute("aria-valuenow", String(clampedPercent));
        }
        progressTitle.textContent = title;
        progressDetail.textContent = detail;
      }

      function setResultActions(mode, downloadUrl = "") {
        latestDownloadUrl = downloadUrl || latestDownloadUrl;
        resultActions.classList.toggle("hidden", !mode);
        downloadButton.classList.toggle("hidden", mode !== "done");
        newFileButton.classList.toggle("hidden", mode !== "done");
        retryButton.classList.toggle("hidden", mode !== "failed");
      }

      function resetProgress() {
        stopPolling();
        latestDownloadUrl = "";
        progress.classList.add("hidden");
        progress.classList.remove("done", "failed", "determinate");
        progressFill.style.width = "";
        setResultActions("");
      }

      function stopPolling() {
        if (pollTimer) {
          clearTimeout(pollTimer);
          pollTimer = null;
        }
      }

      function downloadResult(downloadUrl) {
        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = "result.md";
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function readJsonResponse(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || data.error || "Request failed.");
        }
        return data;
      }

      async function pollStatus(statusUrl, downloadUrl, startedAt) {
        const response = await fetch(statusUrl, { headers: { Accept: "application/json" } });
        const job = await readJsonResponse(response);
        const currentPage = Number(job.current_page);
        const totalPages = Number(job.total_pages);
        const progressPercent = Number(job.progress_percent);
        const hasPageProgress = Number.isFinite(currentPage) && Number.isFinite(totalPages) && totalPages > 0;
        const hasPercent = Number.isFinite(progressPercent);

        if (job.status === "done") {
          stopPolling();
          status.textContent = "Done";
          const detail = hasPageProgress
            ? `Page ${totalPages} of ${totalPages} completed. Preparing download...`
            : "Preparing download...";
          latestDownloadUrl = job.download_url || downloadUrl;
          setProgress("Done! Your file is ready", detail, "done", 100);
          setResultActions("done", latestDownloadUrl);
          downloadResult(latestDownloadUrl);
          setBusy(false);
          submit.disabled = true;
          return;
        }

        if (job.status === "failed") {
          stopPolling();
          status.textContent = "Failed";
          setProgress("Something went wrong", job.error || "Conversion failed.", "failed", hasPercent ? progressPercent : null);
          setResultActions("failed");
          setControlsDisabled(false);
          setBusy(false);
          return;
        }

        const elapsedSeconds = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
        status.textContent = "Processing";
        if (hasPageProgress && hasPercent) {
          const nextPage = Math.min(totalPages, currentPage + 1);
          const detail = currentPage >= totalPages
            ? `Page ${totalPages} of ${totalPages} completed. Preparing download...`
            : `Processing page ${nextPage} of ${totalPages}...`;
          setProgress(
            "Processing your document...",
            detail,
            "",
            progressPercent,
          );
        } else {
          setProgress("Processing your document...", `This can take a minute for scanned files. ${elapsedSeconds}s elapsed`);
        }
        pollTimer = setTimeout(() => {
          pollStatus(statusUrl, downloadUrl, startedAt).catch((error) => {
            stopPolling();
            status.textContent = "Failed";
            setProgress("Something went wrong", error.message, "failed");
            setResultActions("failed");
            setControlsDisabled(false);
            setBusy(false);
          });
        }, 2000);
      }

      function resetForm() {
        form.reset();
        fileName.textContent = "PDF, Word, Excel, PowerPoint, Markdown, or image";
        status.textContent = "Ready";
        setBusy(false);
        setControlsDisabled(false);
        resetProgress();
        updateEngine();
      }

      async function startConversion() {
        if (!fileInput.files.length) {
          status.textContent = "Ready";
          setProgress("Upload a document", "Choose a file before converting.", "failed");
          return;
        }

        const formData = new FormData(form);
        stopPolling();
        latestDownloadUrl = "";
        setResultActions("");
        setControlsDisabled(true);
        setBusy(true);
        status.textContent = "Uploading";
        setProgress("Uploading your document...", "Sending file...");

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: formData,
            headers: { Accept: "application/json" },
          });
          const job = await readJsonResponse(response);
          status.textContent = "Processing";
          setProgress("Processing your document...", "Starting conversion...");
          await pollStatus(job.status_url, job.download_url, Date.now());
        } catch (error) {
          stopPolling();
          status.textContent = "Failed";
          setProgress("Something went wrong", error.message, "failed");
          setResultActions("failed");
          setControlsDisabled(false);
          setBusy(false);
        }
      }

      fileInput.addEventListener("change", () => {
        fileName.textContent = fileInput.files[0]?.name || "PDF, Word, Excel, PowerPoint, Markdown, or image";
      });

      engine.addEventListener("change", updateEngine);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await startConversion();
      });

      downloadButton.addEventListener("click", () => {
        if (latestDownloadUrl) {
          downloadResult(latestDownloadUrl);
        }
      });

      newFileButton.addEventListener("click", resetForm);

      retryButton.addEventListener("click", () => {
        startConversion();
      });

      window.addEventListener("pageshow", () => {
        stopPolling();
        status.textContent = "Ready";
        setBusy(false);
        setControlsDisabled(false);
      });

      updateEngine();
    </script>
  </body>
</html>
